services:

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    ports:
      - "4001:80"
    volumes:
      - ./php:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - frontend
      - backend

  php:
    image: php:8.3-fpm
    container_name: php
    volumes:
      - ./php:/var/www/html
    networks:
      - backend

  mysql:
    image: mysql:8.4
    container_name: mysql
    restart: always
    environment:
      MYSQL_DATABASE: testdb
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/mysql_root_password
      MYSQL_USER_FILE: /run/secrets/mysql_user
      MYSQL_PASSWORD_FILE: /run/secrets/mysql_password
    secrets:
      - mysql_root_password
      - mysql_user
      - mysql_password
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - backend

  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: phpmyadmin
    ports:
      - "6001:80"
    environment:
      PMA_HOST: mysql
    depends_on:
      - mysql
    networks:
      - backend
      - frontend

volumes:
  mysql_data:

networks:
  frontend:
  backend:

secrets:
  mysql_root_password:
    file: ./secrets/mysql_root_password.txt

  mysql_user:
    file: ./secrets/mysql_user.txt

  mysql_password:
    file: ./secrets/mysql_password.txt